<html lang="en">

<title>SoilSense – AI Soil & Nutrient Analyzer</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#EDE8E0;min-height:100%}
body{min-height:100%;display:flex;justify-content:center;background:#EDE8E0;font-family:'DM Sans',sans-serif}
#root{width:100%;max-width:560px;background:#fff;min-height:100vh;box-shadow:0 0 60px rgba(0,0,0,.10)}
:root{
  --green:#2D5016;--green-m:#3B6912;--green-bg:#F0F7E8;
  --amber:#C87B00;--amber-bg:#FEF3E2;
  --red:#B91C1C;--red-bg:#FFF5F5;
  --blue:#1565C0;--blue-bg:#E3F2FD;
  --teal:#0F6E56;--teal-bg:#E0F4F1;
  --text1:#1C1A17;--text2:#6B6760;--text3:#9A9690;
  --bg1:#FFFFFF;--bg2:#F8F5F0;--bg3:#F1EDE6;
  --b1:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.13);
  --r-md:10px;--r-lg:14px;--r-xl:18px;
}
.app{font-family:'DM Sans',sans-serif;max-width:560px;width:100%}
/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:.85rem 1rem .7rem;border-bottom:1px solid var(--b1);background:#fff;position:sticky;top:0;z-index:10}
.logo{width:36px;height:36px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.hdr-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--text1);line-height:1}
.hdr-sub{font-size:11px;color:var(--text2);margin-top:1px}
/* Nav */
.nav{display:grid;grid-template-columns:repeat(5,1fr);background:var(--bg2);border-bottom:1px solid var(--b1)}
.nb{border:none;background:transparent;cursor:pointer;padding:9px 4px 7px;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;border-bottom:2px solid transparent}
.nb:hover{background:var(--bg1)}
.ni{font-size:18px;line-height:1}
.nl{font-size:10px;font-weight:500;color:var(--text2)}
.nb.active .nl{color:var(--green-m)}
.nb.active{border-bottom-color:var(--green-m);background:var(--bg1)}
.nbadge{background:var(--red);color:#fff;border-radius:10px;font-size:9px;font-weight:600;padding:1px 5px;margin-left:2px}
/* Content */
.pg{padding:.9rem 1rem 3rem}
/* Cards */
.card{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--r-lg);padding:1.1rem;margin-bottom:.85rem}
.cl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r-md);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all .15s}
.btn:active{transform:scale(.97)}
.bg{background:var(--green-m);color:#fff}.bg:hover{background:var(--green)}.bg:disabled{background:#aac48a;cursor:not-allowed;transform:none}
.bs{background:var(--green-bg);color:var(--green);border:1px solid #c8e4a0}.bs:hover{background:#e2f0d2}
.bgh{background:transparent;color:var(--text2);border:1px solid var(--b2)}.bgh:hover{background:var(--bg2)}
.bw{width:100%}
/* Inputs */
.inp{padding:10px 13px;border-radius:var(--r-md);border:1px solid var(--b2);background:var(--bg2);color:var(--text1);font-family:'DM Sans',sans-serif;font-size:14px;width:100%;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--green-m)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
/* Metrics */
.mets{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:.85rem}
.met{background:var(--bg2);border-radius:var(--r-md);padding:10px 7px;text-align:center;border:1px solid var(--b1)}
.mv{font-size:20px;font-weight:600;color:var(--text1);line-height:1.1;margin-bottom:2px}
.ml{font-size:10px;color:var(--text2);font-weight:500}
/* Crop */
.ctog{display:flex;gap:0;background:var(--bg2);border-radius:9px;padding:3px;margin-bottom:10px;border:1px solid var(--b1)}
.ctb{flex:1;padding:8px;text-align:center;border-radius:7px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;background:transparent;color:var(--text2);transition:all .15s}
.ctb.active{background:var(--bg1);color:var(--green-m);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.cb{border:1.5px solid var(--b1);border-radius:var(--r-md);padding:9px 5px;background:var(--bg1);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;transition:all .15s}
.cb:hover,.cb.sel{border-color:var(--green-m)}
.cb.sel{background:var(--green-bg)}
/* Steps */
.sdot{width:24px;height:24px;border-radius:50%;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);background:var(--bg1);flex-shrink:0;transition:all .2s}
.sdot.act{border-color:var(--green-m);color:var(--green-m)}
.sdot.done{background:var(--green-m);border-color:var(--green-m);color:#fff}
.sline{flex:1;height:1.5px;background:var(--b1)}
.sline.done{background:var(--green-m)}
.slbl{font-size:10px;color:var(--text2);margin-top:3px}
.slbl.act{color:var(--green-m);font-weight:500}
/* Upload */
.uzone{border:2px dashed var(--b2);border-radius:var(--r-lg);padding:2.2rem 1rem;text-align:center;cursor:pointer;background:var(--bg2);transition:all .15s}
.uzone:hover{border-color:var(--green-m);background:var(--green-bg)}
/* Calendar */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem}
.wd{border-radius:9px;padding:7px 3px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .15s}
.wd:hover{background:var(--bg2)}
.wd.tod{border-color:var(--green-m)}
.wd.sel{background:var(--green-bg);border-color:var(--green-m)}
.wdn{font-size:10px;color:var(--text2);margin-bottom:3px;font-weight:500}
.wdd{font-size:13px;font-weight:500;color:var(--text1)}
.wdot{width:5px;height:5px;border-radius:50%;margin:3px auto 0}
.wdot.has{background:var(--green-m)}
.wdot.ov{background:var(--red)}
/* Reading rows */
.rrow{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--b1)}
.rrow:last-child{border-bottom:none}
.rthumb{width:46px;height:46px;border-radius:9px;object-fit:cover;flex-shrink:0}
.rph{width:46px;height:46px;border-radius:9px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
/* Field */
.fcard{border-left:3px solid var(--green-m);padding-left:calc(1.1rem - 3px)}
/* Forecast */
.fcg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px}
.fcc{background:var(--bg2);border-radius:var(--r-md);padding:9px 4px;text-align:center;border:1px solid var(--b1)}
.fcd{font-size:10px;color:var(--text2);margin-bottom:4px;font-weight:500}
.fci{font-size:18px;line-height:1;margin-bottom:4px}
.fct{font-size:11px;color:var(--text1);font-weight:500}
.fcr{font-size:10px;color:var(--blue);margin-top:2px}
/* Schedule */
.sck{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;transition:all .15s}
.sck.done{background:var(--green-m);border-color:var(--green-m)}
/* Misc */
.tipbox{background:var(--green-bg);border:1px solid #c8e4a0;border-radius:var(--r-md);padding:11px 13px;margin-top:.8rem}
.errbox{background:var(--red-bg);border:1px solid #fecaca;border-radius:var(--r-md);padding:10px 13px;color:var(--red);font-size:13px;margin:.5rem 0}
.adv{border-radius:var(--r-md);padding:12px 14px;margin-bottom:.85rem}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text2);border:1px solid var(--b1)}
.mbb{height:5px;border-radius:3px;background:var(--b1);margin:.35rem 0}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2)}
.spinner{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
.spg{width:30px;height:30px;border:3px solid var(--b1);border-top-color:var(--green-m);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
/* Nutrient bars */
.nbar-bg{height:7px;border-radius:4px;background:var(--b1);overflow:hidden;margin:.3rem 0}
.nbar-fill{height:7px;border-radius:4px;transition:width 1.2s ease}
/* Lab badge */
.labbadge{font-size:11px;background:#E3F2FD;color:#1565C0;border-radius:20px;padding:1px 8px;border:1px solid #90CAF9}
/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
video{width:100%;display:block;max-height:240px;object-fit:cover}
canvas{display:none}
</style>
</head>

const toISO=d=>new Date(d).toISOString().split('T')[0];
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const dayStart=()=>{const d=new Date();d.setHours(0,0,0,0);return d};
const nwd=(cid,st)=>{const c=ALL.find(x=>x.id===cid);const b=c?c.wd:3;if(st==='Very Dry'||st==='Dry')return 0;if(st==='Saturated')return b+4;if(st==='Wet')return b+2;if(st==='Moist')return b+1;return b;};

// ── Gauges ──
function MiniGauge({pct,size=84}){
  const r=size*.42,cx=size/2,cy=size/2+4,circ=Math.PI*r,filled=(pct/100)*circ;
  return(<svg width={size} height={size*.6} viewBox={`0 0 ${size} ${size*.6}`}><path d={`M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="#E5E2DC" strokeWidth="8" strokeLinecap="round"/><path d={`M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke={MC(pct)} strokeWidth="8" strokeLinecap="round" strokeDasharray={`${filled} ${circ}`} style={{transition:'stroke-dasharray 1s ease'}}/><text x={cx} y={cy+2} textAnchor="middle" style={{fontSize:`${size*.18}px`,fontWeight:'600',fill:'#1C1A17',fontFamily:'DM Sans,sans-serif'}}>{pct}%</text></svg>);
}
function Gauge({pct}){
  const r=68,cx=110,cy=90,circ=Math.PI*r,filled=(pct/100)*circ;
  return(<svg width="220" height="108" viewBox="0 0 220 108"><path d={`M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke="#E5E2DC" strokeWidth="13" strokeLinecap="round"/><path d={`M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}`} fill="none" stroke={MC(pct)} strokeWidth="13" strokeLinecap="round" strokeDasharray={`${filled} ${circ}`} style={{transition:'stroke-dasharray 1.1s ease'}}/><text x={cx} y={cy-8} textAnchor="middle" style={{fontSize:'27px',fontWeight:'600',fill:'#1C1A17',fontFamily:'DM Sans,sans-serif'}}>{pct}%</text><text x={cx} y={cy+12} textAnchor="middle" style={{fontSize:'12px',fill:'#6B6760',fontFamily:'DM Sans,sans-serif'}}>soil moisture</text><text x={cx-r+2} y={cy+20} style={{fontSize:'10px',fill:'#6B6760',fontFamily:'DM Sans,sans-serif'}}>Dry</text><text x={cx+r-20} y={cy+20} style={{fontSize:'10px',fill:'#6B6760',fontFamily:'DM Sans,sans-serif'}}>Wet</text></svg>);
}

// ── Nutrient bar component ──
function NBar({label,emoji,level,score,indicator,labVal,labUnit}){
  const isHigh=level==='High';const isLow=level==='Low';
  const lc=isLow?'#B91C1C':isHigh?'#1565C0':'#2D5016';
  const lb=isLow?'#FFF5F5':isHigh?'#E3F2FD':'#F0F7E8';
  const bc=isLow?'#B91C1C':isHigh?'#1565C0':'#3B6912';
  return(
    <div style={{marginBottom:13}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:15}}>{emoji}</span>
          <span style={{fontSize:13,fontWeight:500,color:'#1C1A17'}}>{label}</span>
          {labVal&&<span className="labbadge">Lab: {labVal}{labUnit}</span>}
        </div>
        <span className="badge" style={{background:lb,color:lc}}>{level}</span>
      </div>
      <div className="nbar-bg"><div className="nbar-fill" style={{width:score+'%',background:bc}}/></div>
      {indicator&&<div style={{fontSize:11,color:'#6B6760',marginTop:2,lineHeight:1.4}}>{indicator}</div>}
    </div>
  );
}

  const isTropical=cropCat==='carib';
    try{
      const res=await fetch(PROXY_URL,{

          system:`You are an expert agricultural soil scientist, tropical agronomist, plant pathologist, and integrated pest management (IPM) specialist with deep knowledge of Caribbean and tropical crops including banana, plantain, scotch bonnet pepper, callaloo, dasheen, ackee, breadfruit, sugarcane, cassava, and yam. Analyze the soil or potting mix AND any visible plants, leaves, and soil surface in the image — looking carefully for any signs of pest infestation including visible insects, larvae, grubs, fungal growth, tunneling, webbing, mounding, or plant symptoms that suggest soil pest activity.${ci?` Plant: ${ci.n} (${isH?'houseplant':'farm crop'}). Optimal moisture: ${ci.l}.`:''} Respond ONLY with valid JSON, no markdown, no trailing commas: {"moisture_percent":<0-100>,"status":"Very Dry"|"Dry"|"Optimal"|"Moist"|"Wet"|"Saturated","seedling_ready":true|false,"watering_needed":true|false,"seedling_rec":"<one sentence>","watering_rec":"<one sentence tailored to plant type>","tip":"<one practical care tip>","confidence":"Low"|"Medium"|"High","visual_cue":"<brief visual description>","nutrients":{"nitrogen":{"level":"Low"|"Adequate"|"High","score":<0-100>,"indicator":"<visual basis for this estimate>"},"phosphorus":{"level":"Low"|"Adequate"|"High","score":<0-100>,"indicator":"<visual basis>"},"potassium":{"level":"Low"|"Adequate"|"High","score":<0-100>,"indicator":"<visual basis>"},"organic_matter":{"level":"Low"|"Moderate"|"High","score":<0-100>,"indicator":"<visual basis>"},"overall_health":"Poor"|"Fair"|"Good"|"Excellent","health_score":<0-100>},"plant_symptoms":{"detected":true|false,"symptoms":["<observed symptom>"],"likely_deficiency":"Nitrogen"|"Phosphorus"|"Potassium"|"Iron"|"Magnesium"|"Calcium"|"None detected","plant_health":"Poor"|"Fair"|"Good"|"Excellent"},"fertilizer_rec":"<one specific fertilizer recommendation based on deficiencies>","nutrient_disclaimer":"Visual AI estimate only — confirm with a soil test kit for precise values","pest_analysis":{"detected":true|false,"signs":["<observed sign 1>","<observed sign 2>"],"likely_pests":["<pest name>"],"severity":"None"|"Low"|"Moderate"|"High","affected_area":"<brief description of where pests observed>","treatment_rec":"<one specific chemical or integrated treatment recommendation>","organic_option":"<one organic or natural treatment alternative>","urgency":"Monitor"|"Act soon"|"Treat immediately","prevention_tip":"<one prevention tip tailored to the plant and environment>"}}`,

        })

      if(!res.ok){const e=await res.json().catch(()=>({}));setErr('API error: '+(e.error?.message||res.statusText));setBusy(false);return;}

      const txt=data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();

          {hist.slice(0,3).map((h,i)=>(
            <div key={h.id} className="rrow" style={{borderBottom:i<2&&i<hist.slice(0,3).length-1?'1px solid #F1EDE6':'none'}}>
              {h.image?<img src={h.image} className="rthumb" alt=""/>:<div className="rph">{h.cropInfo?h.cropInfo.e:'🌱'}</div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4}}>
                  <span style={{fontWeight:600,fontSize:14,color:MC(h.result.moisture_percent)}}>{h.result.moisture_percent}%</span>
                  <span className="badge" style={{background:SB(h.result.status),color:SC(h.result.status)}}>{h.result.status}</span>
                  {h.result.nutrients&&<span className="badge" style={{background:HB[h.result.nutrients.overall_health]||'#f5f5f5',color:HC[h.result.nutrients.overall_health]||'#555'}}>{h.result.nutrients.overall_health}</span>}
                  {h.result.pest_analysis?.detected&&<span className="badge" style={{background:'#FFF5F5',color:'#B91C1C'}}>🐛 {h.result.pest_analysis.severity}</span>}
                </div>
                <div className="mbb"><div style={{height:5,borderRadius:3,width:`${h.result.moisture_percent}%`,background:MC(h.result.moisture_percent)}}/></div>
                <div style={{fontSize:11,color:'#9A9690',display:'flex',gap:8}}><span>{fmt(h.date)}</span>{h.fieldName&&<span>📍 {h.fieldName}</span>}</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {wx&&(()=>{const cur=wx.current;return(<div className="card" style={{cursor:'pointer'}} onClick={()=>setTab('weather')}><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{fontSize:32}}>{wmo(cur.weather_code)[1]}</div><div><div style={{fontSize:15,fontWeight:500,color:'#1C1A17'}}>{Math.round(cur.temperature_2m)}° · {wmo(cur.weather_code)[0]}</div><div style={{fontSize:12,color:'#6B6760'}}>Humidity {cur.relative_humidity_2m}%</div></div><span style={{marginLeft:'auto',fontSize:12,color:'#3B6912',fontWeight:500}}>Weather →</span></div></div>);})()}
      {!wx&&<div style={{textAlign:'center',marginBottom:'.8rem'}}><button className="btn bgh" style={{fontSize:13}} onClick={()=>setTab('weather')}>🌤 Enable weather forecast →</button></div>}
    </>);
  };

  // ── ANALYZE ──
  const Analyze=()=>{
    if(step==='report'&&result)return(
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}><span style={{fontSize:20}}>📋</span><span style={{fontWeight:600,fontSize:16,color:'#1C1A17'}}>Full report</span></div>
        <pre style={{background:'#F8F5F0',borderRadius:10,padding:13,fontSize:11,fontFamily:'monospace',color:'#1C1A17',whiteSpace:'pre-wrap',lineHeight:1.6,maxHeight:280,overflowY:'auto',marginBottom:12}}>{makeReport()}</pre>
        <div style={{display:'flex',gap:8}}>
          <button className="btn bgh" style={{flex:1}} onClick={copyRep}>{copied?'✓ Copied!':'📋 Copy'}</button>
          <button className="btn bgh" style={{flex:1}} onClick={()=>{const t=makeReport();navigator.share?navigator.share({title:'SoilSense Report',text:t}):copyRep();}}>📤 Share</button>
          <button className="btn bs" style={{flex:1}} onClick={()=>setStep('results')}>← Back</button>
        </div>
      </div>
    );
    return(<>
      {/* Steps */}
      <div style={{display:'flex',alignItems:'center',margin:'0 0 1.1rem'}}>
        {['Setup','Capture','Results'].map((lbl,i)=>(
          <React.Fragment key={lbl}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
              <div className={`sdot${i<stepIdx?' done':i===stepIdx?' act':''}`}>{i<stepIdx?'✓':i+1}</div>
              <div className={`slbl${i===stepIdx?' act':''}`}>{lbl}</div>
            </div>
            {i<2&&<div className={`sline${i<stepIdx?' done':''}`}/>}
          </React.Fragment>
        ))}
      </div>

      {/* Crop + field setup */}
      {(step==='setup'||step==='capture')&&(<>
        <div className="card">
          <div className="cl">Plant type <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:'#bbb'}}>(optional)</span></div>
          <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:3,marginBottom:10,scrollbarWidth:'none'}}>
            {CATS.map(cat=><button key={cat.id} onClick={()=>{setCropCat(cat.id);setCrop(null);}} style={{flexShrink:0,padding:'7px 13px',borderRadius:20,border:'1.5px solid',borderColor:cropCat===cat.id?'#3B6912':'#E5E2DC',background:cropCat===cat.id?'#F0F7E8':'#fff',color:cropCat===cat.id?'#2D5016':'#6B6760',fontFamily:'DM Sans,sans-serif',fontSize:13,fontWeight:cropCat===cat.id?500:400,cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s'}}>{cat.label}</button>)}
          </div>
          <div className="cg">
            {(CROP_MAP[cropCat]||FARM).map(c=><button key={c.id} className={'cb'+(crop===c.id?' sel':'')} onClick={()=>setCrop(crop===c.id?null:c.id)}><span style={{fontSize:21,display:'block',marginBottom:3,lineHeight:1}}>{c.e}</span><div style={{fontSize:12,fontWeight:500,color:'#1C1A17',lineHeight:1.2}}>{c.n}</div><div style={{fontSize:10,color:'#6B6760',marginTop:1}}>{c.l}</div></button>)}
          </div>
        </div>
        <div className="card" style={{padding:'1rem'}}>
          <div className="cl">{isH?'Pot / location':'Field name'} <span style={{fontWeight:400,textTransform:'none',letterSpacing:0,color:'#bbb'}}>(optional)</span></div>
          <div style={{display:'flex',gap:8}}>
            <input className="inp" type="text" placeholder={isH?'e.g. Living room windowsill':cropCat==='carib'?'e.g. Back yard, hillside plot':'e.g. North plot, Field 3'} value={field} onChange={e=>saveF(e.target.value)}/>
            <button className="btn bgh" style={{padding:'9px 12px',flexShrink:0}} onClick={getGPS} disabled={gpsL}>{gpsL?'…':'📍'}</button>
          </div>
          {gps&&<div style={{fontSize:12,color:'#3B6912',marginTop:6}}>📍 {gps.lat}, {gps.lng}</div>}
        </div>
      </>)}

      {!cam&&!image&&(<>
        <div className="uzone" onClick={()=>fRef.current.click()}>
          <div style={{fontSize:36,marginBottom:8}}>{isH?'🪴':'📸'}</div>
          <div style={{fontWeight:500,color:'#1C1A17',marginBottom:4}}>{isH?'Upload a photo of your potting mix':'Upload a soil photo'}</div>
          <div style={{fontSize:13,color:'#6B6760'}}>{isH?'Include plant leaves if visible — helps detect deficiency symptoms':isTropical?'Include leaves and stem for best tropical crop analysis':'30–60 cm from bare soil · include any visible plants'}</div>
          <input ref={fRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
        </div>
        <div style={{display:'flex',gap:8,marginTop:'.75rem'}}>
          <button className="btn bgh" style={{flex:1}} onClick={()=>f2Ref.current.click()}>📁 Upload photo<input ref={f2Ref} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/></button>
          <button className="btn" style={{flex:1,background:'#2c4a1a',color:'#d4edaa',border:'none'}} onClick={startCam}>📷 Use camera</button>
        </div>
      </>)}

      {cam&&<div className="card" style={{padding:0,overflow:'hidden'}}><video ref={vidRef} autoPlay playsInline muted/><canvas ref={canRef}/><div style={{display:'flex',gap:8,padding:'.75rem'}}><button className="btn bgh" style={{flexShrink:0}} onClick={stopCam}>✕ Cancel</button><button className="btn bg" style={{flex:1}} onClick={capturePhoto}>📸 Capture</button></div></div>}
      {image&&!cam&&<div className="card" style={{padding:0,overflow:'hidden'}}><img src={image} style={{width:'100%',maxHeight:240,objectFit:'cover',display:'block'}} alt="Soil sample"/><div style={{display:'flex',gap:8,padding:'.75rem'}}><button className="btn bgh" style={{flexShrink:0}} onClick={reset}>🔄 Retake</button><button className="btn bg" style={{flex:1}} onClick={analyze} disabled={busy}>{busy?<><div className="spinner"/>Analyzing soil &amp; nutrients...</>:`🔬 Analyze soil & nutrients`}</button></div></div>}
      {err&&<div className="errbox">{err}</div>}

      {result&&step==='results'&&(<>
        {/* Moisture */}
        <div className="card">
          {(()=>{const fit=cropFit(result);const ci=crop?ALL.find(x=>x.id===crop):null;const fm={ideal:{bg:'#E8F5E3',c:'#2d6012',t:`✓ Ideal for ${ci?.n}`},close:{bg:'#FFF3E0',c:'#a05e00',t:`⚠ Borderline (optimal ${ci?.l})`},off:{bg:'#FFF5F5',c:'#B91C1C',t:`✗ Out of range (optimal ${ci?.l})`}};return ci&&fit&&<div style={{marginBottom:10}}><span className="badge" style={{background:fm[fit].bg,color:fm[fit].c}}>{fm[fit].t}</span></div>;})()}
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'.4rem 0 .5rem'}}><Gauge pct={result.moisture_percent}/><span className="badge" style={{background:SB(result.status),color:SC(result.status),marginTop:5,padding:'4px 16px',fontSize:13,fontWeight:500}}>{result.status}</span></div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:7,flexWrap:'wrap',marginTop:8}}>
            {field&&<span className="pill">{isH?'🪴':'📍'} {field}</span>}
            {gps&&<span className="pill">🗺 {gps.lat}, {gps.lng}</span>}
            <span className="pill" style={{color:{Low:'#C87B00',Medium:'#3B6912',High:'#0F6E56'}[result.confidence]}}>{result.confidence} confidence</span>
          </div>
          {result.visual_cue&&<div style={{fontSize:12,color:'#6B6760',textAlign:'center',marginTop:6,lineHeight:1.4}}>{result.visual_cue}</div>}
        </div>

        {/* Recommendations */}
        <div className="card">
          <div className="cl">Recommendations</div>
          {[{icon:result.seedling_ready?'✅':'⏸️',bg:result.seedling_ready?'#F0F7E8':'#FFF5F0',lbl:isH?'Repotting & plant health':'Planting seedlings',txt:result.seedling_rec},{icon:result.watering_needed?'💧':'🚫',bg:result.watering_needed?'#E3F2FD':'#F0F7E8',lbl:'Watering',txt:result.watering_rec}].map((r,i)=>(
            <div key={i} style={{display:'flex',gap:11,padding:'10px 0',borderBottom:i===0?'1px solid #F1EDE6':'none'}}>
              <div style={{width:36,height:36,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,background:r.bg,flexShrink:0}}>{r.icon}</div>
              <div><div style={{fontSize:11,color:'#6B6760',margin:'2px 0',textTransform:'uppercase',letterSpacing:'.06em'}}>{r.lbl}</div><div style={{fontSize:13,color:'#1C1A17',lineHeight:1.5}}>{r.txt}</div></div>
            </div>
          ))}
          <div className="tipbox"><div style={{fontSize:12,color:'#2D5016',fontWeight:500,marginBottom:3}}>💡 Care tip</div><div style={{fontSize:13,color:'#2d5410',lineHeight:1.5}}>{result.tip}</div></div>
        </div>

        {/* Nutrient analysis */}
        {result.nutrients&&(
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div className="cl" style={{margin:0}}>Nutrient analysis</div>
              <span style={{fontSize:11,background:'#FEF3E2',color:'#C87B00',border:'1px solid #fcd96a',borderRadius:20,padding:'2px 9px',fontWeight:500}}>⚗ AI visual estimate</span>
            </div>
            <NBar label="Nitrogen (N)" emoji="🌿" level={result.nutrients.nitrogen.level} score={result.nutrients.nitrogen.score} indicator={result.nutrients.nitrogen.indicator} labVal={labVals.n} labUnit=" ppm"/>
            <NBar label="Phosphorus (P)" emoji="🌸" level={result.nutrients.phosphorus.level} score={result.nutrients.phosphorus.score} indicator={result.nutrients.phosphorus.indicator} labVal={labVals.p} labUnit=" ppm"/>
            <NBar label="Potassium (K)" emoji="💪" level={result.nutrients.potassium.level} score={result.nutrients.potassium.score} indicator={result.nutrients.potassium.indicator} labVal={labVals.k} labUnit=" ppm"/>
            <NBar label="Organic matter" emoji="🍂" level={result.nutrients.organic_matter.level} score={result.nutrients.organic_matter.score} indicator={result.nutrients.organic_matter.indicator} labVal={labVals.om} labUnit="%"/>
            <div style={{borderTop:'1px solid #F1EDE6',paddingTop:12,marginTop:4,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontSize:12,color:'#6B6760',marginBottom:3}}>Overall soil health</div>
                <div style={{fontSize:17,fontWeight:600,color:HC[result.nutrients.overall_health]||'#555'}}>{result.nutrients.overall_health}</div>
                {labVals.ph&&<div style={{fontSize:12,color:'#6B6760',marginTop:4}}>pH: <strong style={{color:'#1C1A17'}}>{labVals.ph}</strong></div>}
              </div>
              <div style={{width:58,height:58,borderRadius:'50%',background:'#F8F5F0',border:`3.5px solid ${HC[result.nutrients.overall_health]||'#555'}`,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
                <span style={{fontSize:17,fontWeight:700,color:HC[result.nutrients.overall_health]||'#555',lineHeight:1}}>{result.nutrients.health_score}</span>
                <span style={{fontSize:9,color:'#6B6760'}}>/ 100</span>
              </div>
            </div>
            {result.fertilizer_rec&&(
              <div style={{background:'#E3F2FD',border:'1px solid #90CAF9',borderRadius:10,padding:'10px 13px',marginTop:12}}>
                <div style={{fontSize:12,fontWeight:500,color:'#1565C0',marginBottom:3}}>🌿 Fertilizer recommendation</div>
                <div style={{fontSize:13,color:'#1565C0',lineHeight:1.5}}>{result.fertilizer_rec}</div>
              </div>
            )}
            <div style={{fontSize:11,color:'#6B6760',marginTop:10,lineHeight:1.4,borderTop:'1px solid #F1EDE6',paddingTop:8}}>⚠ {result.nutrient_disclaimer||'Visual AI estimate — confirm with a soil test kit for precise values.'}</div>
          </div>
        )}

        {/* Plant symptoms */}
        {result.plant_symptoms?.detected&&(
          <div className="card">
            <div className="cl">Plant symptoms detected</div>
            <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10}}>
              <div style={{width:36,height:36,borderRadius:8,background:'#FFF3E0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>🔍</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:'#1C1A17',marginBottom:5}}>Likely deficiency: <span style={{color:'#C87B00'}}>{result.plant_symptoms.likely_deficiency}</span></div>
                {result.plant_symptoms.symptoms?.length>0&&<ul style={{paddingLeft:16,margin:0}}>{result.plant_symptoms.symptoms.map((s,i)=><li key={i} style={{fontSize:13,color:'#1C1A17',lineHeight:1.6}}>{s}</li>)}</ul>}
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:12,color:'#6B6760'}}>Plant health:</span>
              <span className="badge" style={{background:HB[result.plant_symptoms.plant_health]||'#f5f5f5',color:HC[result.plant_symptoms.plant_health]||'#555'}}>{result.plant_symptoms.plant_health}</span>
            </div>
          </div>
        )}

        {/* Pest detection */}
        {result.pest_analysis&&(
          <div className="card" style={{borderColor:result.pest_analysis.severity==='High'?'#fca5a5':result.pest_analysis.severity==='Moderate'?'#fcd96a':undefined}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div className="cl" style={{margin:0}}>🐛 Pest & disease scan</div>
              <span style={{fontSize:11,borderRadius:20,padding:'2px 9px',fontWeight:600,background:result.pest_analysis.detected?{High:'#FFF5F5',Moderate:'#FFF9E6',Low:'#FEF3E2',None:'#F0F7E8'}[result.pest_analysis.severity]||'#F0F7E8':'#F0F7E8',color:result.pest_analysis.detected?{High:'#B91C1C',Moderate:'#92680A',Low:'#C87B00',None:'#2D5016'}[result.pest_analysis.severity]||'#2D5016':'#2D5016',border:`1px solid ${result.pest_analysis.detected?{High:'#fca5a5',Moderate:'#F5C842',Low:'#fcd96a',None:'#c8e4a0'}[result.pest_analysis.severity]||'#c8e4a0':'#c8e4a0'}`}}>{result.pest_analysis.detected?result.pest_analysis.severity+' risk':'✓ No pests detected'}</span>
            </div>
            {result.pest_analysis.detected?(
              <>
                {result.pest_analysis.likely_pests?.length>0&&(
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:12,color:'#6B6760',marginBottom:6,fontWeight:500,textTransform:'uppercase',letterSpacing:'.06em'}}>Suspected pests</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                      {result.pest_analysis.likely_pests.map((p,i)=><span key={i} style={{fontSize:13,background:'#FFF5F5',color:'#B91C1C',borderRadius:20,padding:'3px 11px',border:'1px solid #fca5a5',fontWeight:500}}>{p}</span>)}
                    </div>
                  </div>
                )}
                {result.pest_analysis.signs?.length>0&&(
                  <div style={{marginBottom:12}}>
                    <div style={{fontSize:12,color:'#6B6760',marginBottom:5,fontWeight:500,textTransform:'uppercase',letterSpacing:'.06em'}}>Signs observed</div>
                    <ul style={{paddingLeft:16,margin:0}}>
                      {result.pest_analysis.signs.map((s,i)=><li key={i} style={{fontSize:13,color:'#1C1A17',lineHeight:1.6}}>{s}</li>)}
                    </ul>
                  </div>
                )}
                {result.pest_analysis.affected_area&&<div style={{fontSize:13,color:'#6B6760',marginBottom:12}}>📍 {result.pest_analysis.affected_area}</div>}
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                  <span style={{fontSize:12,color:'#6B6760'}}>Urgency:</span>
                  <span style={{fontSize:12,fontWeight:600,color:{Monitor:'#3B6912','Act soon':'#C87B00','Treat immediately':'#B91C1C'}[result.pest_analysis.urgency]||'#555'}}>{result.pest_analysis.urgency==='Treat immediately'?'🚨':result.pest_analysis.urgency==='Act soon'?'⚠️':'👁'} {result.pest_analysis.urgency}</span>
                </div>
                <div style={{background:'#FFF5F5',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 13px',marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:500,color:'#B91C1C',marginBottom:3}}>💊 Treatment recommendation</div>
                  <div style={{fontSize:13,color:'#B91C1C',lineHeight:1.5}}>{result.pest_analysis.treatment_rec}</div>
                </div>
                {result.pest_analysis.organic_option&&(
                  <div style={{background:'#F0F7E8',border:'1px solid #c8e4a0',borderRadius:10,padding:'10px 13px',marginBottom:10}}>
                    <div style={{fontSize:12,fontWeight:500,color:'#2D5016',marginBottom:3}}>🌿 Organic alternative</div>
                    <div style={{fontSize:13,color:'#2d5410',lineHeight:1.5}}>{result.pest_analysis.organic_option}</div>
                  </div>
                )}
                {result.pest_analysis.prevention_tip&&(
                  <div style={{fontSize:12,color:'#6B6760',lineHeight:1.5,borderTop:'1px solid #F1EDE6',paddingTop:10,marginTop:4}}>🛡 Prevention: {result.pest_analysis.prevention_tip}</div>
                )}
              </>
            ):(
              <div style={{display:'flex',alignItems:'center',gap:12,padding:'6px 0'}}>
                <div style={{width:36,height:36,borderRadius:8,background:'#F0F7E8',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>✅</div>
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:'#2D5016'}}>No visible pest activity detected</div>
                  <div style={{fontSize:12,color:'#6B6760',marginTop:2}}>Soil surface and plant appear healthy. Continue regular monitoring.</div>
                </div>
              </div>
            )}
            {result.pest_analysis.prevention_tip&&!result.pest_analysis.detected&&(
              <div style={{fontSize:12,color:'#6B6760',lineHeight:1.5,borderTop:'1px solid #F1EDE6',paddingTop:10,marginTop:10}}>🛡 Prevention tip: {result.pest_analysis.prevention_tip}</div>
            )}
          </div>
        )}

        {/* Lab results */}
        <div className="card" style={{padding:'1rem'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:showLabForm?10:0}}>
            <div>
              <div style={{fontSize:13,fontWeight:500,color:'#1C1A17'}}>🧪 Add lab test results</div>
              <div style={{fontSize:11,color:'#6B6760',marginTop:2}}>Override AI estimates with real values</div>
            </div>
            <button className="btn bgh" style={{padding:'6px 12px',fontSize:12}} onClick={()=>setShowLabForm(v=>!v)}>{showLabForm?'Cancel':'+ Add'}</button>
          </div>
          {showLabForm&&(
            <div style={{display:'flex',flexDirection:'column',gap:8,paddingTop:4}}>
              {[{k:'n',l:'Nitrogen (N)',u:'ppm'},{k:'p',l:'Phosphorus (P)',u:'ppm'},{k:'k',l:'Potassium (K)',u:'ppm'},{k:'ph',l:'pH level',u:''},{k:'om',l:'Organic matter',u:'%'}].map(({k,l,u})=>(
                <div key={k} style={{display:'flex',alignItems:'center',gap:8}}>
                  <label style={{fontSize:13,color:'#1C1A17',width:130,flexShrink:0}}>{l}</label>
                  <input type="number" step="0.1" className="inp" placeholder={u||'value'} value={labVals[k]||''} onChange={e=>setLabVals(v=>({...v,[k]:e.target.value}))}/>
                  {u&&<span style={{fontSize:12,color:'#6B6760',flexShrink:0,width:28}}>{u}</span>}
                </div>
              ))}
              <button className="btn bg bw" style={{marginTop:4}} onClick={()=>setShowLabForm(false)}>Save lab results</button>
            </div>
          )}
          {!showLabForm&&Object.keys(labVals).some(k=>labVals[k])&&(
            <div style={{marginTop:10,display:'flex',flexWrap:'wrap',gap:6}}>
              {Object.entries({n:'N',p:'P',k:'K',ph:'pH',om:'OM'}).map(([key,lbl])=>labVals[key]?<span key={key} className="labbadge">{lbl}: {labVals[key]}{key==='om'?'%':key==='ph'?'':' ppm'}</span>:null)}
            </div>
          )}
        </div>

        {/* Actions */}
        {!showAS
          ?<div style={{display:'flex',gap:7,marginBottom:'.9rem'}}>
              <button className="btn bgh" style={{flex:1}} onClick={reset}>📷 New</button>
              <button className="btn bgh" style={{flex:1}} onClick={()=>setShowAS(true)}>📅 Schedule</button>
              <button className="btn" style={{flex:1,background:'#2c4a1a',color:'#d4edaa',border:'none'}} onClick={()=>setStep('report')}>📋 Report</button>
            </div>
          :<div className="card"><div style={{fontWeight:500,color:'#1C1A17',marginBottom:10}}>📅 Schedule next watering</div><div style={{display:'flex',flexDirection:'column',gap:8}}><input type="date" className="inp" value={sdDate} onChange={e=>setSdDate(e.target.value)}/><input type="text" className="inp" placeholder="Notes (optional)" value={sdNote} onChange={e=>setSdNote(e.target.value)}/><div style={{display:'flex',gap:8}}><button className="btn bgh" style={{flex:1}} onClick={()=>setShowAS(false)}>Cancel</button><button className="btn bg" style={{flex:1}} onClick={addSched}>Save to schedule</button></div></div></div>
        }
      </>)}
    </>);
  };

  // ── SCHEDULE ──
  const Schedule=()=>{
    if(!loaded)return<div style={{textAlign:'center',padding:'2rem',color:'#6B6760'}}>Loading…</div>;
    const now=dayStart();const today=new Date();
    const startOfWeek=new Date(today);startOfWeek.setDate(today.getDate()-today.getDay());
    const week=Array.from({length:7},(_,i)=>{const d=new Date(startOfWeek);d.setDate(startOfWeek.getDate()+i);return d;});
    const byDay=d=>sched.filter(s=>new Date(s.date).toDateString()===d.toDateString());
    const filtered=selDay?sched.filter(s=>new Date(s.date).toDateString()===selDay.toDateString()):sched;
    const overdueF=filtered.filter(s=>!s.done&&new Date(s.date)<now);
    const pendingF=filtered.filter(s=>!s.done&&new Date(s.date)>=now).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const doneF=filtered.filter(s=>s.done).sort((a,b)=>new Date(b.date)-new Date(a.date));

    const SI=({item,ov})=>{const d=new Date(item.date);const diff=Math.round((d-now)/864e5);const lbl=ov?`${Math.abs(diff)}d overdue`:diff===0?'Today':diff===1?'Tomorrow':`In ${diff}d`;const lc=ov?'#B91C1C':diff===0?'#3B6912':diff<=2?'#C87B00':'#6B6760';return(
      <div style={{display:'flex',alignItems:'flex-start',gap:9,padding:'10px 0',borderBottom:'1px solid #F1EDE6'}}>
        <button className={'sck'+(item.done?' done':'')} style={{border:`1.5px solid ${ov?'#fca5a5':'rgba(0,0,0,.15)'}`,marginTop:2}} onClick={()=>toggleDone(item.id)}>{item.done?'✓':''}</button>
        <div style={{flex:1,minWidth:0}}><div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}><span style={{fontSize:13,fontWeight:500,color:'#1C1A17'}}>{fmtD(item.date)}</span><span style={{fontSize:11,fontWeight:500,color:lc}}>{lbl}</span>{item.cropInfo&&<span style={{fontSize:11,color:'#6B6760'}}>{item.cropInfo.e} {item.cropInfo.n}</span>}</div>{item.notes&&<div style={{fontSize:12,color:'#6B6760',marginTop:2}}>{item.notes}</div>}{item.fieldName&&<div style={{fontSize:12,color:'#6B6760'}}>📍 {item.fieldName}</div>}</div>
        <button onClick={()=>delSched(item.id)} style={{border:'none',background:'transparent',cursor:'pointer',color:'#9A9690',fontSize:18,padding:'0 2px',lineHeight:1}}>×</button>
      </div>
    );};

    return(<>
      <div className="card" style={{padding:'1rem'}}>
        <div className="cl">🔔 Reminders</div>
        {notifPerm==='granted'?<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><span style={{width:8,height:8,borderRadius:'50%',background:'#3B6912',display:'inline-block'}}/><span style={{fontSize:13,color:'#3B6912',fontWeight:500}}>Browser reminders enabled</span></div>:<div style={{fontSize:13,color:'#6B6760',marginBottom:8,lineHeight:1.5}}>Get notified when watering events are due while this page is open.</div>}
        <button className="btn bs bw" style={{fontSize:13}} onClick={reqNotif}>{notifPerm==='granted'?'📬 Send test notification':'🔔 Enable reminders'}</button>
        {notifMsg&&<div style={{fontSize:12,color:'#6B6760',marginTop:8,lineHeight:1.4}}>{notifMsg}</div>}
        <div style={{fontSize:11,color:'#9A9690',marginTop:8,lineHeight:1.4,borderTop:'1px solid #F1EDE6',paddingTop:8}}>Notifications require this browser window to be open. For persistent reminders, add events to your calendar app.</div>
      </div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}><div className="cl" style={{margin:0}}>This week</div>{selDay&&<button className="btn bgh" style={{padding:'3px 10px',fontSize:12}} onClick={()=>setSelDay(null)}>Show all</button>}</div>
        <div className="week">{week.map(d=>{const evs=byDay(d);const hasEv=evs.some(e=>!e.done);const hasOv=evs.some(e=>!e.done&&new Date(e.date)<now);const isToday=d.toDateString()===today.toDateString();const isSel=selDay&&selDay.toDateString()===d.toDateString();return(<div key={d.toString()} className={'wd'+(isToday?' tod':'')+(isSel?' sel':'')} onClick={()=>setSelDay(isSel?null:d)}><div className="wdn">{d.toLocaleDateString(undefined,{weekday:'short'}).charAt(0)}</div><div className="wdd" style={{color:isToday?'#3B6912':'#1C1A17',fontWeight:isToday?600:400}}>{d.getDate()}</div><div className={'wdot'+(hasOv?' ov':hasEv?' has':'')}/></div>);})}</div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}><div style={{fontSize:13,color:'#6B6760'}}>{selDay?`${byDay(selDay).length} event${byDay(selDay).length!==1?'s':''} on ${fmtDS(toISO(selDay))}`:sched.length+' total event'+(sched.length!==1?'s':'')}</div><button className="btn bs" style={{padding:'7px 13px',fontSize:13}} onClick={()=>{setSdDate(toISO(new Date()));setSdNote('');setShowAS(v=>!v);}}>+ Add</button></div>
      {showAS&&<div className="card"><div style={{fontWeight:500,color:'#1C1A17',marginBottom:10}}>Add watering event</div><div style={{display:'flex',flexDirection:'column',gap:8}}><input type="date" className="inp" value={sdDate} onChange={e=>setSdDate(e.target.value)}/><input type="text" className="inp" placeholder="Notes (field, plant…)" value={sdNote} onChange={e=>setSdNote(e.target.value)}/><div style={{display:'flex',gap:8}}><button className="btn bgh" style={{flex:1}} onClick={()=>setShowAS(false)}>Cancel</button><button className="btn bg" style={{flex:1}} onClick={async()=>{const it={id:Date.now(),date:sdDate,crop:null,cropInfo:null,fieldName:field||null,notes:sdNote,done:false};await saveS([...sched,it].sort((a,b)=>new Date(a.date)-new Date(b.date)));setShowAS(false);setSdNote('');}}>Save</button></div></div></div>}
      {!sched.length&&!showAS&&<div className="empty"><div style={{fontSize:38,marginBottom:10}}>📅</div><div style={{fontSize:15,fontWeight:500,color:'#1C1A17',marginBottom:5}}>No events yet</div><div style={{fontSize:13}}>Tap "📅 Schedule" after an analysis, or "+ Add" above.</div></div>}
      {overdueF.length>0&&<div className="card" style={{padding:'0 1.1rem',borderColor:'#fca5a5'}}><div style={{fontSize:11,fontWeight:500,color:'#B91C1C',textTransform:'uppercase',letterSpacing:'.07em',padding:'10px 0 4px'}}>⚠ Overdue ({overdueF.length})</div>{overdueF.map(i=><SI key={i.id} item={i} ov={true}/>)}</div>}
      {pendingF.length>0&&<div className="card" style={{padding:'0 1.1rem'}}><div style={{fontSize:11,fontWeight:500,color:'#6B6760',textTransform:'uppercase',letterSpacing:'.07em',padding:'10px 0 4px'}}>Upcoming</div>{pendingF.map(i=><SI key={i.id} item={i} ov={false}/>)}</div>}
      {doneF.length>0&&<div className="card" style={{padding:'0 1.1rem',opacity:.65}}><div style={{fontSize:11,fontWeight:500,color:'#6B6760',textTransform:'uppercase',letterSpacing:'.07em',padding:'10px 0 4px'}}>Completed</div>{doneF.slice(0,5).map(i=><div key={i.id} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 0',borderBottom:'1px solid #F1EDE6'}}><div className="sck done">✓</div><div style={{flex:1}}><span style={{fontSize:13,color:'#6B6760',textDecoration:'line-through'}}>{fmtD(i.date)}</span>{i.notes&&<span style={{fontSize:12,color:'#6B6760',marginLeft:8}}>{i.notes}</span>}</div><button onClick={()=>delSched(i.id)} style={{border:'none',background:'transparent',cursor:'pointer',color:'#9A9690',fontSize:18,padding:'0 2px'}}>×</button></div>)}</div>}
    </>);
  };

  // ── HISTORY ──
  const History=()=>{
    if(!loaded)return<div style={{textAlign:'center',padding:'2rem',color:'#6B6760'}}>Loading…</div>;
    const Readings=()=>{
      if(!hist.length)return<div className="empty"><div style={{fontSize:38,marginBottom:10}}>📊</div><div style={{fontSize:15,fontWeight:500,color:'#1C1A17',marginBottom:5}}>No readings yet</div><div style={{fontSize:13}}>Analyze your first soil sample to start your history log.</div></div>;
      const recent=hist.slice(0,10).reverse();const avg=Math.round(recent.reduce((s,h)=>s+h.result.moisture_percent,0)/recent.length);
      return(<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}>
          <div style={{fontSize:13,color:'#6B6760'}}>{hist.length} reading{hist.length!==1?'s':''}</div>
          {!confirmClear?<button className="btn bgh" style={{padding:'5px 11px',fontSize:12}} onClick={()=>setConfirmClear(true)}>🗑 Clear all</button>:<div style={{display:'flex',gap:6}}><button className="btn bgh" style={{padding:'5px 10px',fontSize:12}} onClick={()=>setConfirmClear(false)}>Cancel</button><button className="btn" style={{padding:'5px 10px',fontSize:12,background:'#B91C1C',color:'#fff',border:'none',borderRadius:8}} onClick={()=>{saveH([]);setConfirmClear(false);}}>Confirm</button></div>}
        </div>
        {hist.length>=2&&<div className="card"><div className="cl">Moisture trend (last {recent.length})</div><div style={{display:'flex',gap:3,alignItems:'flex-end',height:52,marginBottom:6}}>{recent.map((h,i)=><div key={i} title={`${h.result.moisture_percent}%`} style={{flex:1,background:MC(h.result.moisture_percent),borderRadius:'3px 3px 0 0',height:`${h.result.moisture_percent*.52}%`,minHeight:3}}/>)}</div><div style={{fontSize:12,color:'#6B6760'}}>Average: <strong style={{color:'#1C1A17'}}>{avg}%</strong></div></div>}
        <div className="card" style={{padding:'0 1.1rem'}}>
          {hist.map((h,i)=>(
            <div key={h.id} className="rrow" style={{borderBottom:i<hist.length-1?'1px solid #F1EDE6':'none'}}>
              {h.image?<img src={h.image} className="rthumb" alt=""/>:<div className="rph">{h.cropInfo?h.cropInfo.e:'🌱'}</div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4,flexWrap:'wrap'}}>
                  <span style={{fontWeight:600,fontSize:14,color:MC(h.result.moisture_percent)}}>{h.result.moisture_percent}%</span>
                  <span className="badge" style={{background:SB(h.result.status),color:SC(h.result.status)}}>{h.result.status}</span>
                  {h.result.nutrients&&<span className="badge" style={{background:HB[h.result.nutrients.overall_health]||'#f5f5f5',color:HC[h.result.nutrients.overall_health]||'#555'}}>{h.result.nutrients.overall_health}</span>}
                  {h.cropInfo&&<span style={{fontSize:11,color:'#6B6760'}}>{h.cropInfo.e} {h.cropInfo.n}</span>}
                </div>
                <div className="mbb"><div style={{height:5,borderRadius:3,width:`${h.result.moisture_percent}%`,background:MC(h.result.moisture_percent)}}/></div>
                <div style={{fontSize:11,color:'#9A9690',display:'flex',gap:8,flexWrap:'wrap'}}><span>{fmt(h.date)}</span>{h.fieldName&&<span>📍 {h.fieldName}</span>}</div>
              </div>
            </div>
          ))}
        </div>
      </>);
    };
    const Fields=()=>{
      if(!fields.length)return<div className="empty"><div style={{fontSize:38,marginBottom:10}}>🗺</div><div style={{fontSize:15,fontWeight:500,color:'#1C1A17',marginBottom:5}}>No fields tagged</div><div style={{fontSize:13}}>Add a field name when analyzing to compare across locations.</div></div>;
      return(<>
        <div style={{fontSize:13,color:'#6B6760',marginBottom:'.75rem'}}>{fields.length} location{fields.length!==1?'s':''} · {hist.length} total readings</div>
        {fields.map(f=>{const sorted=[...f.readings].sort((a,b)=>new Date(b.date)-new Date(a.date));const latest=sorted[0];const prev=sorted[1];const trend=prev?latest.result.moisture_percent-prev.result.moisture_percent:null;const avg2=Math.round(sorted.reduce((s,r)=>s+r.result.moisture_percent,0)/sorted.length);const crops2=[...new Set(sorted.filter(r=>r.cropInfo).map(r=>r.cropInfo.e+' '+r.cropInfo.n))];const ti=trend===null?'—':trend>3?'↑ Rising':trend<-3?'↓ Falling':'→ Stable';const tc=trend===null?'#6B6760':trend>3?'#1565C0':trend<-3?'#C87B00':'#3B6912';const latestHealth=latest.result.nutrients?.overall_health;return(
          <div key={f.name} className="card fcard">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
              <div><div style={{fontWeight:600,fontSize:15,color:'#1C1A17'}}>📍 {f.name}</div>{f.coords&&<div style={{fontSize:11,color:'#6B6760',marginTop:1}}>{f.coords.lat}, {f.coords.lng}</div>}</div>
              <div style={{textAlign:'right',fontSize:11,color:'#6B6760'}}>{sorted.length} reading{sorted.length!==1?'s':''}<br/>{fmt(latest.date)}</div>
            </div>
            {crops2.length>0&&<div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10}}>{crops2.map(c=><span key={c} style={{fontSize:11,background:'#F8F5F0',borderRadius:6,padding:'2px 8px',color:'#6B6760',border:'1px solid #E5E2DC'}}>{c}</span>)}</div>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:7,marginBottom:10}}>
              {[{l:'Moisture',v:`${latest.result.moisture_percent}%`,c:MC(latest.result.moisture_percent)},{l:'Average',v:`${avg2}%`,c:'#1C1A17'},{l:'Trend',v:ti,c:tc},{l:'Soil health',v:latestHealth||'—',c:HC[latestHealth]||'#6B6760'}].map(m=>(
                <div key={m.l} style={{background:'#F8F5F0',borderRadius:8,padding:'8px 6px',textAlign:'center',border:'1px solid #E5E2DC'}}>
                  <div style={{fontSize:10,color:'#6B6760',marginBottom:3,fontWeight:500}}>{m.l}</div>
                  <div style={{fontSize:12,fontWeight:500,color:m.c}}>{m.v}</div>
                </div>
              ))}
            </div>
            <div className="mbb"><div style={{height:5,borderRadius:3,width:`${latest.result.moisture_percent}%`,background:MC(latest.result.moisture_percent)}}/></div>
            {sorted.length>=3&&<><div style={{fontSize:11,color:'#6B6760',margin:'8px 0 4px',fontWeight:500}}>Moisture history</div><div style={{display:'flex',gap:2,alignItems:'flex-end',height:36}}>{sorted.slice(0,12).reverse().map((r,i)=><div key={i} title={`${r.result.moisture_percent}%`} style={{flex:1,background:MC(r.result.moisture_percent),borderRadius:'2px 2px 0 0',height:`${r.result.moisture_percent*.36}%`,minHeight:3}}/>)}</div></>}
          </div>
        );})}
      </>);
    };
    return(<>
      <div style={{display:'flex',gap:0,background:'#F8F5F0',borderRadius:9,padding:3,marginBottom:'.85rem',border:'1px solid #E5E2DC'}}>
        {[['readings','📋 Readings '+(hist.length?`(${hist.length})`:'')],['fields','🗺 Fields '+(fields.length?`(${fields.length})`:'')]].map(([v,l])=><button key={v} onClick={()=>setHistView(v)} style={{flex:1,padding:'7px',textAlign:'center',borderRadius:7,border:'none',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontSize:13,fontWeight:histView===v?500:400,background:histView===v?'#fff':'transparent',color:histView===v?'#3B6912':'#6B6760',transition:'all .15s',boxShadow:histView===v?'0 1px 3px rgba(0,0,0,.08)':'none'}}>{l}</button>)}
      </div>
      {histView==='readings'?<Readings/>:<Fields/>}
    </>);
  };

  // ── WEATHER ──
  const Weather=()=>{
    if(wxL)return<div style={{textAlign:'center',padding:'3rem 1rem',color:'#6B6760'}}><div className="spg"/>Loading weather data…</div>;
    if(!wx&&!wxErr)return<div className="empty" style={{padding:'3rem 1rem'}}><div style={{fontSize:40,marginBottom:10}}>🌦</div><div style={{fontSize:15,fontWeight:500,color:'#1C1A17',marginBottom:5}}>Local weather & rainfall</div><div style={{fontSize:13,marginBottom:20,lineHeight:1.6}}>View current conditions and a 7-day forecast to plan watering alongside your soil readings.</div><button className="btn bg bw" style={{maxWidth:260,margin:'0 auto'}} onClick={reqWxLoc}>📍 Use my location</button></div>;
    if(wxErr)return<div><div className="errbox">{wxErr}</div><button className="btn bg bw" onClick={reqWxLoc}>Try again</button></div>;
    const cur=wx.current,daily=wx.daily,units=wx.current_units;
    const wmo=c=>WMO[c]||['','🌡'];
    const todayStr=toISO(new Date());const ti=daily.time.indexOf(todayStr);const fs=ti>=0?ti:3;
    const past=daily.time.slice(0,fs).slice(-3).map(t=>{const i=daily.time.indexOf(t);return{date:t,rain:Math.round((daily.rain_sum?.[i]||0)*10)/10};});
    const totalRain=past.reduce((s,d)=>s+d.rain,0);
    const fc=daily.time.slice(fs,fs+7).map((t,i)=>({date:t,code:daily.weather_code[fs+i],max:Math.round(daily.temperature_2m_max[fs+i]),min:Math.round(daily.temperature_2m_min[fs+i]),rain:Math.round((daily.rain_sum?.[fs+i]||0)*10)/10}));
    const rainWk=Math.round(fc.reduce((s,d)=>s+d.rain,0)*10)/10;
    let adv,aC,aB,aBdr;
    if(totalRain>25){adv="Heavy recent rainfall — soil is likely saturated. Delay irrigation and check drainage.";aC='#1565C0';aB='#E3F2FD';aBdr='#1565C0';}
    else if(totalRain>10){adv="Good recent rainfall. Check soil moisture before irrigating — may not be needed today.";aC='#0F6E56';aB='#E0F4F1';aBdr='#0F6E56';}
    else if(totalRain>3){adv="Light recent rainfall. Monitor soil moisture before watering young plants.";aC='#3B6912';aB='#F0F7E8';aBdr='#3B6912';}
    else{adv="Low recent rainfall — soil may be drying out. Consider a moisture and nutrient check.";aC='#C87B00';aB='#FEF3E2';aBdr='#C87B00';}
    if(rainWk>15)adv+=' Good rain forecast this week — natural irrigation ahead.';
    return(<>
      <div className="card"><div className="cl">Current conditions</div><div style={{display:'flex',alignItems:'center',gap:14}}><div style={{fontSize:44}}>{wmo(cur.weather_code)[1]}</div><div><div style={{fontSize:26,fontWeight:600,color:'#1C1A17',lineHeight:1.1}}>{Math.round(cur.temperature_2m)}{units.temperature_2m}</div><div style={{fontSize:13,color:'#6B6760'}}>{wmo(cur.weather_code)[0]}</div></div><div style={{marginLeft:'auto',textAlign:'right'}}><div style={{fontSize:11,color:'#6B6760',marginBottom:1}}>Humidity</div><div style={{fontSize:15,fontWeight:500,color:'#1C1A17',marginBottom:6}}>{cur.relative_humidity_2m}%</div><div style={{fontSize:11,color:'#6B6760',marginBottom:1}}>Wind</div><div style={{fontSize:15,fontWeight:500,color:'#1C1A17'}}>{Math.round(cur.wind_speed_10m)} {units.wind_speed_10m}</div></div></div></div>
      <div className="adv" style={{background:aB,borderLeft:`3px solid ${aBdr}`}}><div style={{fontSize:12,fontWeight:500,color:aC,marginBottom:4}}>💧 Watering advisory</div><div style={{fontSize:13,color:aC,lineHeight:1.5}}>{adv}</div></div>
      {past.length>0&&<div className="card"><div className="cl">Rainfall — past 3 days</div><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>{past.map(d=><div key={d.date} style={{background:'#F8F5F0',borderRadius:9,padding:'10px 8px',textAlign:'center',border:'1px solid #E5E2DC'}}><div style={{fontSize:11,color:'#6B6760',marginBottom:5,fontWeight:500}}>{fmtDS(d.date)}</div><div style={{fontSize:22,fontWeight:600,color:d.rain>5?'#1565C0':d.rain>1?'#0F6E56':'#1C1A17'}}>{d.rain}</div><div style={{fontSize:11,color:'#6B6760'}}>mm</div></div>)}</div><div style={{fontSize:12,color:'#6B6760',marginTop:10}}>3-day total: <strong style={{color:'#1C1A17'}}>{totalRain.toFixed(1)} mm</strong></div></div>}
      <div className="card"><div className="cl">7-day forecast</div><div className="fcg">{fc.map((d,i)=><div key={d.date} className="fcc"><div className="fcd">{i===0?'Today':new Date(d.date+'T12:00:00').toLocaleDateString(undefined,{weekday:'short'})}</div><div className="fci">{wmo(d.code)[1]}</div><div className="fct">{d.min}–{d.max}°</div>{d.rain>0&&<div className="fcr">💧{d.rain}mm</div>}</div>)}</div><div style={{fontSize:12,color:'#6B6760',marginTop:10}}>Week total: <strong style={{color:rainWk>10?'#1565C0':'#1C1A17'}}>{rainWk} mm</strong></div></div>
      <button className="btn bgh bw" style={{marginBottom:'.9rem'}} onClick={()=>wxCoords&&fetchWx(wxCoords.lat,wxCoords.lng)}>🔄 Refresh weather</button>
    </>);
  };

  const NAV=[['home','🏠','Home'],['analyze','🔬','Analyze'],['schedule','📅','Plan'],['history','📊','Log'],['weather','🌤','Weather']];

  return(
    <div className="app">
      {dueBanner&&dueBanner.length>0&&<div style={{background:'#FFF9E6',borderBottom:'1px solid #F5C842',padding:'10px 1rem',display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:18,flexShrink:0}}>⏰</span><div style={{flex:1,fontSize:13,color:'#92680A',lineHeight:1.4}}><strong>{dueBanner.length} watering event{dueBanner.length!==1?'s':''} due</strong>{dueBanner.filter(d=>d.fieldName).length>0&&' — '+dueBanner.filter(d=>d.fieldName).map(d=>d.fieldName).join(', ')}</div><button onClick={()=>{setTab('schedule');setDueBanner(null);}} style={{border:'none',background:'#F59E0B',color:'#fff',borderRadius:7,padding:'5px 11px',cursor:'pointer',fontSize:12,fontWeight:500,flexShrink:0}}>View</button><button onClick={()=>setDueBanner(null)} style={{border:'none',background:'transparent',cursor:'pointer',fontSize:20,color:'#92680A',padding:'0 2px',lineHeight:1,flexShrink:0}}>×</button></div>}
      <div className="hdr">
        <div className="logo">🌱</div>
        <div><div className="hdr-name">SoilSense</div><div className="hdr-sub">Moisture · Nutrients · Plant health</div></div>
        <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
          {notifPerm==='granted'&&<span style={{fontSize:16}} title="Reminders on">🔔</span>}
          <button className="btn bs" style={{padding:'7px 12px',fontSize:13}} onClick={()=>{reset();setTab('analyze');}}>+ Scan</button>
        </div>
      </div>
      <nav className="nav">
        {NAV.map(([id,icon,lbl])=>(
          <button key={id} className={'nb'+(tab===id?' active':'')} onClick={()=>{if(id==='analyze')reset();setTab(id);}}>
            <span className="ni">{icon}</span>
            <span className="nl">{lbl}{id==='schedule'&&overdue.length>0&&<span className="nbadge">{overdue.length}</span>}</span>
          </button>
        ))}
      </nav>
      <div className="pg">
        {tab==='home'&&<Home/>}
        {tab==='analyze'&&<Analyze/>}
        {tab==='schedule'&&<Schedule/>}
        {tab==='history'&&<History/>}
        {tab==='weather'&&<Weather/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
